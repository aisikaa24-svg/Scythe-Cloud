name: Project SCYTHE - Scraper Engine

on:
  schedule:
    - cron: '30 */12 * * *' # Every 12 hours
  workflow_dispatch:
    inputs:
      telegram_msg_id:
        description: 'The ID of the Telegram message to update'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Stealth Delay (Context Aware)
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual Mission Detected: 5s jitter."
            sleep 5
          else
            # Randomized start for scheduled cycles (5 to 15 mins)
            DELAY=$(( ( RANDOM % 600 )  + 300 ))
            echo "Scheduled Mission: Waiting ${DELAY}s..."
            sleep ${DELAY}
          fi

      - name: Run Scraper
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MSG_ID: ${{ github.event.inputs.telegram_msg_id }}
        run: python collector_cloud.py
